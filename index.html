<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>基金估值</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="基金估值">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>
  :root{
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --line: #2a2f3a;
    --text: #e8e9ed;
    --sub: #8a8f9c;
    --up: #ef4444;
    --down: #22c55e;
    --flat: #8a8f9c;
    --accent: #d4a24c;
    --mono: 'SF Mono', 'Menlo', ui-monospace, monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
    min-height:100vh; overscroll-behavior-y: none;
  }
  body{ padding-bottom: calc(90px + env(safe-area-inset-bottom)); }

  header{
    position:sticky; top:0; z-index:10;
    padding: calc(16px + env(safe-area-inset-top)) 16px 12px;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header h1{ font-size:20px; margin:0; font-weight:700; letter-spacing:0.3px; }
  header .status{ font-size:12px; color:var(--sub); font-family:var(--mono); }
  header .status.live::before{
    content:"●"; color:var(--accent); margin-right:4px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  .market-note{
    margin: 0 16px 12px; font-size:12px; color:var(--sub);
    padding:8px 12px; background:var(--panel); border-radius:10px;
    border:1px solid var(--line);
  }

  #list{ padding: 0 16px; display:flex; flex-direction:column; gap:10px; }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:16px; display:flex; align-items:flex-start; gap:12px;
    position:relative;
  }

  .card .left{ flex:0 0 auto; width:32%; padding-top:2px; }
  .card .name{ font-size:15px; font-weight:600; white-space:normal; line-height:1.3; word-break:break-word; }
  .card .code{ font-size:11.5px; color:var(--sub); font-family:var(--mono); margin-top:4px; }

  .spark-wrap{
    flex:1 1 auto; height:46px; align-self:center; border-radius:8px; overflow:hidden;
    background:#fff; display:flex; align-items:center; justify-content:center;
  }
  .spark-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  .spark-wrap.fallback{ background:transparent; }
  .spark-wrap svg{ width:100%; height:100%; display:block; }

  .card .right{ flex:0 0 auto; align-self:center; text-align:right; }

  .badge{
    font-size:15px; font-weight:700; font-family:var(--mono);
    padding:7px 13px; border-radius:10px; color:#fff; white-space:nowrap;
  }
  .badge.up{ background:var(--up); }
  .badge.down{ background:var(--down); }
  .badge.flat{ background:var(--flat); }

  .nav-chg-line{ margin-top:6px; font-size:11.5px; font-family:var(--mono); font-weight:600; white-space:nowrap; }
  .nav-chg-line .lbl{ color:var(--sub); font-weight:400; margin-right:3px; }
  .nav-chg-line.up{ color:var(--up); }
  .nav-chg-line.down{ color:var(--down); }
  .nav-chg-line.flat{ color:var(--sub); }

  .remove-btn{
    position:absolute; top:10px; right:10px; background:none; border:none;
    color:var(--sub); font-size:16px; padding:4px 6px; line-height:1; z-index:2;
  }
  .remove-btn:active{ color:var(--up); }

  .card.loading .name{ color:var(--sub); }
  .skeleton-text{ font-size:12.5px; color:var(--sub); }

  #empty{ text-align:center; color:var(--sub); padding:60px 20px; font-size:14px; line-height:1.8; }
  #empty .big{ font-size:34px; margin-bottom:10px; }

  .addbar{
    position:fixed; left:0; right:0; bottom:0;
    padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent, var(--bg) 25%);
    display:flex; gap:8px; z-index:20;
  }
  .addbar input{
    flex:1; background:var(--panel-2); border:1px solid var(--line);
    color:var(--text); border-radius:12px; padding:12px 14px;
    font-size:15px; outline:none; font-family:var(--mono);
  }
  .addbar input:focus{ border-color:var(--accent); }
  .addbar button{
    background:var(--accent); color:#1a1408; border:none;
    border-radius:12px; padding:0 20px; font-size:15px; font-weight:700; cursor:pointer;
  }
  .addbar button:active{ opacity:0.8; }

  .toast{
    position:fixed; top:calc(60px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 16px; border-radius:10px; font-size:13px; z-index:50;
    opacity:0; transition: opacity .25s ease; pointer-events:none;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<header>
  <h1>基金估值</h1>
  <div class="status" id="status">--</div>
</header>

<div class="market-note" id="marketNote"></div>

<div id="list"></div>
<div id="empty" style="display:none;">
  <div class="big">📈</div>
  下方输入 6 位基金代码，添加你要追踪的基金<br>
  例如 <b>161725</b>（招商中证白酒A）
</div>

<div class="addbar">
  <input id="codeInput" type="tel" inputmode="numeric" pattern="[0-9]*"
         placeholder="输入6位基金代码" maxlength="6">
  <button id="addBtn">添加</button>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "fund-tracker-codes";
  var funds = {};
  var order = [];

  var listEl = document.getElementById("list");
  var emptyEl = document.getElementById("empty");
  var statusEl = document.getElementById("status");
  var noteEl = document.getElementById("marketNote");
  var input = document.getElementById("codeInput");
  var addBtn = document.getElementById("addBtn");
  var toastEl = document.getElementById("toast");

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(function(){ toastEl.classList.remove("show"); }, 1800);
  }

  function marketStatusText(){
    var now = new Date();
    var day = now.getDay();
    var h = now.getHours(), m = now.getMinutes();
    var mins = h*60+m;
    var isWeekday = day >=1 && day <=5;
    var amOpen = 9*60+30, amClose = 11*60+30, pmOpen=13*60, pmClose=15*60;
    var inSession = isWeekday && ((mins>=amOpen && mins<=amClose) || (mins>=pmOpen && mins<=pmClose));
    if(inSession){
      statusEl.textContent = "交易中 · 每30秒刷新";
      statusEl.classList.add("live");
      noteEl.textContent = "当前处于交易时段，估值实时波动，仅供参考，以基金公司公布净值为准。";
    } else {
      statusEl.textContent = "休市";
      statusEl.classList.remove("live");
      noteEl.textContent = isWeekday
        ? "当前非交易时段（9:30-11:30, 13:00-15:00），显示的是最近一次估值。"
        : "周末休市，显示的是上一交易日收盘估值。";
    }
    return inSession;
  }

  // ============ 实时估值：JSONP 天天基金 ============
  window.jsonpgz = function(data){
    if(!data || !data.fundcode) return;
    var code = data.fundcode;
    if(!funds[code]) return;
    funds[code].name = data.name || funds[code].name;
    funds[code].gsz = data.gsz;
    funds[code].gszzl = data.gszzl;
    funds[code].dwjz = data.dwjz;
    funds[code].gztime = data.gztime;
    funds[code].status = "ok";
    renderList();
  };

  function fetchGsz(code){
    var s = document.createElement("script");
    s.src = "https://fundgz.1234567.com.cn/js/" + code + ".js?rt=" + Date.now();
    s.onerror = function(){
      if(funds[code] && funds[code].status !== "ok"){ funds[code].status = "error"; renderList(); }
      s.remove();
    };
    s.onload = function(){ s.remove(); };
    document.body.appendChild(s);
  }
  function refreshAllGsz(){ order.forEach(fetchGsz); }

  // ============ 最新净值涨跌幅：东方财富历史净值，取最近两日算涨跌幅 ============
  var navQueue = [];
  var navBusy = false;
  function queueNavFetch(code){
    if(!funds[code] || funds[code].navStatus === "ok" || funds[code].navStatus === "loading") return;
    funds[code].navStatus = "loading";
    navQueue.push(code);
    processNavQueue();
  }
  function processNavQueue(){
    if(navBusy || navQueue.length === 0) return;
    navBusy = true;
    var code = navQueue.shift();
    var s = document.createElement("script");
    s.src = "https://fund.eastmoney.com/pingzhongdata/" + code + ".js?v=" + Date.now();
    var finish = function(ok){
      if(funds[code]){
        var arr = window.Data_netWorthTrend;
        if(ok && arr && Array.isArray(arr) && arr.length >= 2){
          var last = arr[arr.length-1], prev = arr[arr.length-2];
          funds[code].navChangePct = ((last.y - prev.y) / prev.y * 100);
          funds[code].navStatus = "ok";
        } else {
          funds[code].navStatus = "error";
        }
      }
      try{ window.Data_netWorthTrend = undefined; }catch(e){}
      s.remove();
      navBusy = false;
      renderList();
      processNavQueue();
    };
    s.onload = function(){ finish(true); };
    s.onerror = function(){ finish(false); };
    document.body.appendChild(s);
  }

  // ============ 列表渲染 ============
  function pctClass(v){
    v = parseFloat(v);
    if(isNaN(v)) return "flat";
    if(v > 0.0001) return "up";
    if(v < -0.0001) return "down";
    return "flat";
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  // 天天基金/东方财富官方生成的"当日实时净值估算图"，每次渲染都用新的时间戳避免拿到缓存旧图
  function chartImgUrl(code){
    return "https://j4.dfcfw.com/charts/pic6/" + code + ".png?t=" + Date.now();
  }

  window.handleSparkError = function(imgEl){
    var wrap = imgEl.parentElement;
    if(!wrap) return;
    wrap.classList.add("fallback");
    wrap.innerHTML = '<svg viewBox="0 0 120 40" preserveAspectRatio="none">' +
      '<line x1="0" y1="20" x2="120" y2="20" stroke="#2a2f3a" stroke-dasharray="3 3" stroke-width="1"/></svg>';
  };

  function renderList(){
    marketStatusText();
    if(order.length === 0){
      listEl.style.display = "none";
      emptyEl.style.display = "block";
      return;
    }
    listEl.style.display = "flex";
    emptyEl.style.display = "none";
    listEl.innerHTML = "";
    order.forEach(function(code){
      var f = funds[code];
      var card = document.createElement("div");
      card.className = "card" + (f.status !== "ok" ? " loading" : "");

      var right;
      if(f.status === "ok"){
        var cls = pctClass(f.gszzl);
        var sign = parseFloat(f.gszzl) > 0 ? "+" : "";
        right = '<div class="badge '+cls+'">'+sign+f.gszzl+'%</div>';
      } else if(f.status === "error"){
        right = '<div class="badge flat">失败</div>';
      } else {
        right = '<div class="badge flat">--</div>';
      }

      var navLine;
      if(typeof f.navChangePct === "number"){
        var ncls = pctClass(f.navChangePct);
        var nsign = f.navChangePct > 0 ? "+" : "";
        navLine = '<div class="nav-chg-line '+ncls+'"><span class="lbl">净值</span>'+nsign+f.navChangePct.toFixed(2)+'%</div>';
      } else {
        navLine = '<div class="nav-chg-line flat"><span class="lbl">净值</span>--</div>';
      }

      card.innerHTML =
        '<button class="remove-btn" data-code="'+code+'">✕</button>' +
        '<div class="left">' +
          '<div class="name">'+escapeHtml(f.name || code)+'</div>' +
          '<div class="code">'+code+(f.status==="loading"?' · <span class="skeleton-text">加载中</span>':'')+'</div>' +
        '</div>' +
        '<div class="spark-wrap" id="spark-'+code+'">' +
          '<img src="'+chartImgUrl(code)+'" alt="当日实时估值走势" onerror="handleSparkError(this)">' +
        '</div>' +
        '<div class="right">'+right+navLine+'</div>';

      listEl.appendChild(card);
    });
  }

  listEl.addEventListener("click", function(e){
    var btn = e.target.closest(".remove-btn");
    if(!btn) return;
    e.stopPropagation();
    removeFund(btn.getAttribute("data-code"));
  });

  function addFund(code){
    code = (code || "").trim();
    if(!/^\d{6}$/.test(code)){ showToast("请输入6位数字基金代码"); return; }
    if(funds[code]){ showToast("已在列表中"); return; }
    funds[code] = { code:code, status:"loading", navStatus:"idle", navChangePct:null };
    order.push(code);
    saveCodes();
    renderList();
    fetchGsz(code);
    queueNavFetch(code);
    input.value = "";
  }

  function removeFund(code){
    delete funds[code];
    order = order.filter(function(c){ return c !== code; });
    saveCodes();
    renderList();
  }

  function saveCodes(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(order)); }catch(e){}
  }
  function loadCodes(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var codes = JSON.parse(raw);
        if(Array.isArray(codes)){
          codes.forEach(function(code){
            if(/^\d{6}$/.test(code) && !funds[code]){
              funds[code] = { code:code, status:"loading", navStatus:"idle", navChangePct:null };
              order.push(code);
            }
          });
        }
      }
    }catch(e){}
  }

  addBtn.addEventListener("click", function(){ addFund(input.value); });
  input.addEventListener("keydown", function(e){ if(e.key === "Enter") addFund(input.value); });
  input.addEventListener("input", function(){ input.value = input.value.replace(/\D/g,"").slice(0,6); });

  // ============ 初始化 ============
  loadCodes();
  if(order.length === 0){
    addFund("161725");
  } else {
    renderList();
    refreshAllGsz();
    order.forEach(queueNavFetch);
  }

  setInterval(function(){
    marketStatusText();
    refreshAllGsz();
  }, 30000);
  setInterval(marketStatusText, 15000);

  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("service-worker.js").catch(function(){});
    });
  }
})();
</script>
</body>
</html>
